const HISTORY={
  1:{gc:GC1,dnf:['Matteo Moschetti'],dnfSameAsRes:{}},
  2:{gc:GC2,dnf:['J. Vine','M. Soler','Å. Holter'],dnfSameAsRes:{'Zoé':true}}
};

let curStage=2,curTab='classement',curScores={};

function norm(s){return s.toLowerCase().replace(/[^a-z]/g,'');}
function match(a,b){
  if(norm(a)===norm(b))return true;
  const ap=a.toLowerCase().split(/[\s\-\.]+/).filter(Boolean);
  const bp=b.toLowerCase().split(/[\s\-\.]+/).filter(Boolean);
  const aL=ap[ap.length-1],bL=bp[bp.length-1];
  if(aL&&bL&&norm(aL)===norm(bL))return true;
  if(ap.some(x=>x.length>3&&bp.some(y=>y.length>3&&norm(x)===norm(y))))return true;
  return false;
}
function isDNF(name,sd){return(sd.dnf||[]).some(d=>match(d,name));}
function getGC(name,gc){return gc.find(r=>match(r.name,name))||null;}

function applyRules(pName,sd){
  const prono=PRONOSTICS[pName];
  const sameDay=(sd.dnfSameAsRes||{})[pName];
  let list=[...prono.top10],resActif=false,resBloque=false;
  const idx=list.findIndex(c=>isDNF(c,sd));
  if(idx!==-1){
    if(sameDay||isDNF(prono.res,sd)){resBloque=true;}
    else{list.splice(idx,1);list.push(prono.res);resActif=true;}
  }
  return{list,resActif,resBloque};
}

function computeScores(sd){
  const out={};
  for(const[name] of Object.entries(PRONOSTICS)){
    const{list,resActif,resBloque}=applyRules(name,sd);
    let total=0,rows=[];
    list.forEach((coureur,i)=>{
      const dnf=isDNF(coureur,sd);
      const entry=getGC(coureur,sd.gc);
      const gcPos=(!dnf&&entry)?entry.pos:null;
      const mult=MULTS[i];
      const pts=(gcPos&&PTS_GC[gcPos])?PTS_GC[gcPos]:0;
      const score=pts*mult;
      total+=score;
      rows.push({coureur,gcPos,mult,pts,score,dnf,isRes:resActif&&i===list.length-1,team:entry?entry.team:''});
    });
    out[name]={total:Math.round(total*10)/10,rows,resActif,resBloque};
  }
  return out;
}

function renderStageHeader(n){
  const s=STAGES[n-1];
  document.getElementById('stage-hd').innerHTML=`
  <div class="stage-card">
    <div class="stage-num">Étape ${s.n}</div>
    <div class="stage-info">
      <div class="stage-route">${s.dep} → ${s.arr}</div>
      <div class="stage-meta">
        <span>&#128197; ${s.date}</span>
        <span>&#128739; ${s.km} km</span>
        <span class="stype ${s.type}">${s.label}</span>
      </div>
    </div>
  </div>`;
}

function renderAll(){
  const sd=HISTORY[curStage]||null;
  renderStageHeader(curStage);
  document.getElementById('btn-prev').disabled=curStage<=1;
  document.getElementById('btn-next').disabled=curStage>=21;

  if(!sd){
    const s=STAGES[curStage-1];
    document.getElementById('alerts').innerHTML='';
    document.getElementById('cards').innerHTML=`<div class="no-data">Étape non encore disputée<br><span style="font-size:12px">${s.date} · ${s.dep} → ${s.arr}</span></div>`;
    document.getElementById('gc-body').innerHTML=`<tr><td colspan="4" class="no-data">Résultats à venir</td></tr>`;
    document.getElementById('prono-list').innerHTML=`<div class="no-data">Résultats à venir</div>`;
    curScores={};return;
  }

  const scores=computeScores(sd);
  curScores=scores;
  const sorted=Object.entries(scores).sort((a,b)=>b[1].total-a[1].total);

  const az=document.getElementById('alerts');
  az.innerHTML='';
  for(const[name,data] of Object.entries(scores)){
    const prono=PRONOSTICS[name];
    const firstDNF=prono.top10.find(c=>isDNF(c,sd));
    if(firstDNF&&data.resBloque)
      az.innerHTML+=`<div class="alert"><strong>${name}</strong> — ${firstDNF} (DNF) mais réserviste ${prono.res} aussi abandonné le même jour → pas de substitution.</div>`;
    else if(firstDNF&&data.resActif)
      az.innerHTML+=`<div class="alert-info"><strong>${name}</strong> — Réserviste activé : ${prono.res} remplace ${firstDNF} (DNF).</div>`;
  }

  const cards=document.getElementById('cards');
  cards.innerHTML='';
  sorted.forEach(([name,data],idx)=>{
    const rc=idx===0?'r1':idx===1?'r2':idx===2?'r3':'rN';
    cards.innerHTML+=`
    <div class="pcard${idx===0?' gold':''}" onclick="showDetail('${name}')">
      <div class="pc-head"><span class="pc-name">${name}</span><span class="rb ${rc}">${idx+1}</span></div>
      <div class="pc-pts">${data.total.toFixed(1)}</div><div class="pc-sub">points</div>
      <div class="pc-rows">
        ${data.rows.slice(0,5).map(r=>`<div class="pc-row"><span class="cn${r.dnf?' dnf':''}">${r.coureur}</span><span class="cp">${r.score>0?r.score.toFixed(1):'—'}</span></div>`).join('')}
        <div style="font-size:11px;color:#999;margin-top:4px">+ 5 autres · cliquer pour détail</div>
      </div>
    </div>`;
  });

  const gcBody=document.getElementById('gc-body');
  gcBody.innerHTML='';
  sd.gc.slice(0,20).forEach(r=>{
    const bc=r.pos===1?'p1':r.pos===2?'p2':r.pos===3?'p3':'pN';
    const proTag=Object.values(PRONOSTICS).some(p=>[...p.top10,p.res].some(c=>match(r.name,c)))?'<span class="ptag">pronostiqué</span>':'';
    const dnfT=isDNF(r.name,sd)?'<span class="dnftag">DNF</span>':'';
    gcBody.innerHTML+=`<tr><td><span class="pb ${bc}">${r.pos}</span></td><td>${r.name}${proTag}${dnfT}</td><td style="color:#666;font-size:12px">${r.team}</td><td style="font-family:monospace;font-size:12px;color:#666">${r.time}</td></tr>`;
  });

  renderPronoList();
}

function renderPronoList(){
  const pl=document.getElementById('prono-list');
  pl.innerHTML='';
  if(!Object.keys(curScores).length){pl.innerHTML='<div class="no-data">Résultats à venir</div>';return;}
  Object.keys(PRONOSTICS).forEach(name=>{
    const d=curScores[name];
    const tag=d.resActif?'<span class="rtag">réserviste actif</span>':d.resBloque?'<span style="font-size:11px;color:#854d0e;margin-left:6px">⚠ rés. bloqué</span>':'';
    pl.innerHTML+=`<div class="pcard" onclick="showDetailFromProno('${name}')"><div class="pc-head"><span class="pc-name">${name}${tag}</span>›</div><div style="font-size:13px;color:#666">${d.total.toFixed(1)} pts</div></div>`;
  });
  document.getElementById('prono-list').style.display='';
  document.getElementById('prono-detail').classList.remove('active');
}

function showDetail(name){
  const data=curScores[name];if(!data)return;
  const prono=PRONOSTICS[name];const sd=HISTORY[curStage];
  document.getElementById('dname').textContent=name+' — Étape '+curStage;
  const tb=document.getElementById('dbody');tb.innerHTML='';
  let tot=0;
  data.rows.forEach((r,i)=>{
    const gcStr=r.dnf?'<em style="color:#e8052b;font-size:11px">DNF</em>':(r.gcPos?`${r.gcPos}e`:'—');
    tot+=r.score;
    const resTag=r.isRes?'<span class="rtag">réserviste</span>':'';
    tb.innerHTML+=`<tr${r.dnf?' class="dnf-row"':''}><td>${i+1}<span class="mult">×${r.mult}</span></td><td>${r.coureur}${resTag}</td><td>${gcStr}</td><td>${r.score>0?r.score.toFixed(1):'0'}</td></tr>`;
  });
  tb.innerHTML+=`<tr class="tot"><td colspan="3">Total</td><td>${(Math.round(tot*10)/10).toFixed(1)}</td></tr>`;
  const resEntry=sd?getGC(prono.res,sd.gc):null;
  const resPos=sd&&isDNF(prono.res,sd)?'DNF':(resEntry?`${resEntry.pos}e au GC`:'—');
  const resNote=data.resActif?' (actif)':data.resBloque?' (bloqué)':'';
  tb.innerHTML+=`<tr style="opacity:.7"><td style="color:#666">Réserviste</td><td>${prono.res}<span style="color:#e8052b;font-size:11px;margin-left:4px">${resNote}</span></td><td style="color:#666">${resPos}</td><td>—</td></tr>`;
  if(curTab==='pronostics'){document.getElementById('prono-list').style.display='none';document.getElementById('prono-detail').classList.add('active');}
  else{showTab('pronostics',document.querySelectorAll('.tab')[2]);document.getElementById('prono-list').style.display='none';document.getElementById('prono-detail').classList.add('active');}
}
function showDetailFromProno(name){showDetail(name);}
function backList(){document.getElementById('prono-list').style.display='';document.getElementById('prono-detail').classList.remove('active');}
function showTab(tab,btn){
  curTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(btn)btn.classList.add('active');
  if(tab==='pronostics')renderPronoList();
}
function changeStage(n){curStage=n;renderAll();}
function navigate(dir){const n=curStage+dir;if(n<1||n>21)return;curStage=n;document.getElementById('sel').value=n;renderAll();}

const sel=document.getElementById('sel');
STAGES.forEach(s=>{
  const o=document.createElement('option');
  o.value=s.n;
  o.textContent=`Étape ${s.n} — ${s.dep} › ${s.arr}${!HISTORY[s.n]?' (à venir)':''}`;
  if(s.n===curStage)o.selected=true;
  sel.appendChild(o);
});
renderAll();
</script>
</body>
</html>
